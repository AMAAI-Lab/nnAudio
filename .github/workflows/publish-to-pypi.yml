name: Publish Python package to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build distribution packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: Installation
        run: |
          package_version="$(python - <<'PY'
          import pathlib
          import re

          text = pathlib.Path("nnAudio/__init__.py").read_text()
          match = re.search(r'__version__\s*=\s*"([^"]+)"', text)
          if match is None:
              raise SystemExit("Could not find __version__ in nnAudio/__init__.py")
          print(match.group(1))
          PY
          )"
          tag_version="${GITHUB_REF_NAME#v}"

          if [ "$package_version" != "$tag_version" ]; then
            echo "Tag version $tag_version does not match package version $package_version" >&2
            exit 1
          fi

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Build source and wheel distributions
        working-directory: Installation
        run: python -m build

      - name: Check distribution metadata
        working-directory: Installation
        run: python -m twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v5
        with:
          name: python-package-distributions
          path: Installation/dist/
          if-no-files-found: error

  publish-to-pypi:
    name: Publish package to PyPI
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/nnaudio
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
